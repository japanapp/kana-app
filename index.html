<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="かな" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>かな Drill</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:        #1a1a2e;
      --ink-soft:   #2d2d4a;
      --paper:      #f5f0e8;
      --paper-warm: #ede8dc;
      --red:        #c0392b;
      --red-light:  #e74c3c;
      --gold:       #c9a84c;
      --gold-light: #f0c96a;
      --green:      #27ae60;
      --blue:       #2980b9;
      --text:       #1a1a2e;
      --text-soft:  #5a5a7a;
      --white:      #ffffff;
      --shadow-lg:  0 8px 40px rgba(26,26,46,0.2);
      --radius:     16px;
      --radius-sm:  10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--ink); font-family: 'DM Sans', sans-serif; color: var(--text); overscroll-behavior: none; }

    .screen { display: none; position: fixed; inset: 0; background: var(--ink); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .screen.active { display: flex; flex-direction: column; }

    .app-header {
      background: var(--ink); padding: 12px 20px 14px;
      padding-top: max(env(safe-area-inset-top, 12px), 12px);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .app-title { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 800; color: var(--paper); letter-spacing: .04em; }
    .app-subtitle { font-size: 10px; color: var(--gold); font-weight: 500; letter-spacing: .12em; text-transform: uppercase; margin-top: 2px; }
    .header-back { background: none; border: none; color: var(--gold); font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 6px; }
    .header-back::before { content: '←'; font-size: 18px; }

    .card-area { flex: 1; background: var(--paper); border-radius: 28px 28px 0 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 24px 20px 40px; padding-bottom: max(40px, env(safe-area-inset-bottom, 40px)); }

    /* MODE TABS */
    .mode-tabs { display: flex; gap: 6px; margin-bottom: 20px; background: var(--paper-warm); border-radius: 12px; padding: 4px; }
    .mode-tab { flex: 1; border: none; border-radius: 9px; padding: 10px 4px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; background: transparent; color: var(--text-soft); transition: all .18s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .mode-tab .tab-script { font-family: 'Shippori Mincho', serif; font-size: 17px; }
    .mode-tab.active { background: var(--ink); color: var(--paper); box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .mode-tab.active .tab-script { color: var(--gold); }

    /* HOME */
    .home-hero { text-align: center; padding: 4px 0 16px; }
    .kanji-bg { font-family: 'Shippori Mincho', serif; font-size: 70px; color: var(--ink); opacity: .07; line-height: 1; user-select: none; letter-spacing: -4px; }
    .home-hero h2 { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 800; color: var(--ink); margin-top: -18px; }
    .home-hero p { color: var(--text-soft); font-size: 12px; margin-top: 5px; }

    .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; margin: 14px 0; }
    .stat-card { background: var(--ink); border-radius: var(--radius-sm); padding: 13px 8px; text-align: center; }
    .stat-card .num { font-family: 'Shippori Mincho', serif; font-size: 23px; font-weight: 800; color: var(--gold); line-height: 1; }
    .stat-card .lbl { font-size: 9px; color: var(--paper-warm); margin-top: 3px; opacity: .7; text-transform: uppercase; letter-spacing: .08em; }

    .section-heading { font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-soft); margin: 18px 0 10px; }

    .block-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; }
    .block-btn { aspect-ratio: 1; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; transition: transform .12s; }
    .block-btn:active { transform: scale(.92); }
    .block-btn.unlocked { background: var(--ink); color: var(--paper); }
    .block-btn.unlocked.complete { background: var(--green); color: var(--white); }
    .block-btn.mastered { background: var(--gold); color: var(--ink); }
    .block-btn.locked { background: var(--paper-warm); color: #bbb; cursor: not-allowed; }
    .block-btn .bn { font-size: 13px; font-weight: 700; }
    .block-btn .bk { font-family: 'Shippori Mincho', serif; font-size: 13px; }

    .review-row { margin-top: 10px; }
    .review-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .review-btn { background: var(--paper-warm); border: 2px solid var(--ink); border-radius: var(--radius); padding: 13px 8px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--ink); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: transform .12s; text-align: center; line-height: 1.3; }
    .review-btn:active { transform: scale(.96); }
    .review-btn .ri { font-size: 18px; font-family: 'Shippori Mincho', serif; }
    .review-btn-locked { opacity: .55; cursor: not-allowed; border-style: dashed; }
    .review-lock { font-size: 9px; color: var(--text-soft); margin-top: 2px; font-weight: 400; }

    /* MASTERY BANNER */
    .mastery-banner { background: var(--ink-soft); border: 2px solid var(--gold); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; }
    .mastery-banner h3 { font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--gold-light); margin-bottom: 6px; }
    .mastery-track { height: 6px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .mastery-fill { height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width .4s ease; }
    .mastery-label { font-size: 10px; color: var(--paper); opacity: .6; }
    .mastery-stars { display: flex; gap: 4px; margin-top: 6px; }
    .mastery-star { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(201,168,76,.4); }
    .mastery-star.lit { background: var(--gold); border-color: var(--gold); }

    /* STUDY CARDS */
    .study-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 20px; }
    .study-card { background: var(--ink); border-radius: var(--radius-sm); padding: 14px 6px 10px; text-align: center; }
    .study-char { font-family: 'Shippori Mincho', serif; font-size: 34px; font-weight: 600; color: var(--paper); line-height: 1; }
    .study-rom { font-size: 12px; color: var(--gold); margin-top: 5px; font-weight: 500; }
    .study-hint { font-size: 9px; color: var(--paper); opacity: .45; margin-top: 3px; line-height: 1.35; }

    /* QUIZ */
    .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .quiz-phase-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text-soft); }
    .cycle-dots { display: flex; gap: 5px; }
    .cycle-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--paper-warm); border: 2px solid var(--ink); transition: background .2s; }
    .cycle-dot.active { background: var(--gold); border-color: var(--gold); }
    .cycle-dot.done { background: var(--green); border-color: var(--green); }

    .progress-track { height: 4px; background: var(--paper-warm); border-radius: 2px; margin-bottom: 18px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--red)); border-radius: 2px; transition: width .35s ease; }

    .question-card { background: var(--ink); border-radius: 24px; padding: 26px 20px; text-align: center; margin-bottom: 18px; box-shadow: var(--shadow-lg); min-height: 165px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .q-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .14em; color: var(--gold); opacity: .7; }
    .q-kana { font-family: 'Shippori Mincho', serif; font-size: 72px; font-weight: 800; color: var(--paper); line-height: 1; letter-spacing: .04em; }
    .q-romaji { font-size: 22px; font-weight: 500; color: var(--paper); opacity: .85; font-family: 'Shippori Mincho', serif; }
    .q-hint { font-size: 13px; color: var(--gold-light); font-style: italic; opacity: .8; }

    /* MULTIPLE CHOICE */
    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .choice-btn { border: 2.5px solid var(--paper-warm); border-radius: var(--radius); padding: 16px 10px; font-family: 'Shippori Mincho', serif; font-size: 28px; color: var(--ink); background: var(--white); cursor: pointer; text-align: center; transition: transform .1s, border-color .12s; line-height: 1.2; }
    .choice-btn.rom { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; padding: 18px 10px; }
    .choice-btn:active { transform: scale(.95); }
    .choice-btn.correct { border-color: var(--green); background: #f0fff4; }
    .choice-btn.wrong { border-color: var(--red-light); background: #fff5f5; }
    .choice-btn:disabled { cursor: not-allowed; }

    .submit-btn { width: 100%; background: var(--ink); color: var(--paper); border: none; border-radius: var(--radius); padding: 15px; font-size: 16px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: transform .12s; margin-top: 4px; }
    .submit-btn:active { transform: scale(.97); }

    .feedback-area { min-height: 42px; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
    .feedback-pill { padding: 7px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; display: none; align-items: center; gap: 6px; }
    .feedback-pill.show { display: flex; animation: popIn .2s ease; }
    .feedback-pill.correct { background: #d4edda; color: #155724; }
    .feedback-pill.wrong { background: #f8d7da; color: #721c24; }
    .feedback-pill.reveal { background: #fff3cd; color: #856404; }
    @keyframes popIn { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .attempts-row { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
    .attempt-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--paper-warm); border: 2px solid #ccc; }
    .attempt-dot.used { background: var(--red-light); border-color: var(--red-light); }

    .complete-card { background: var(--ink); border-radius: 24px; padding: 34px 20px; text-align: center; color: var(--paper); box-shadow: var(--shadow-lg); }
    .complete-card .big-emoji { font-size: 50px; margin-bottom: 12px; }
    .complete-card h2 { font-family: 'Shippori Mincho', serif; font-size: 24px; font-weight: 800; color: var(--gold-light); margin-bottom: 6px; }
    .complete-card p { color: var(--paper); opacity: .7; font-size: 13px; margin-bottom: 22px; }
    .complete-card .mastery-result { background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.3); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 18px; }
    .complete-card .mastery-result .mr-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
    .complete-card .mastery-result .mr-stars { display: flex; gap: 5px; justify-content: center; margin-bottom: 4px; }
    .complete-card .mastery-result .mr-star { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(201,168,76,.4); }
    .complete-card .mastery-result .mr-star.lit { background: var(--gold); border-color: var(--gold); }
    .complete-card .mastery-result .mr-note { font-size: 11px; color: var(--paper); opacity: .6; }
    .complete-btn { display: block; width: 100%; background: var(--gold); color: var(--ink); border: none; border-radius: var(--radius); padding: 15px; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: transform .12s; }
    .complete-btn:active { transform: scale(.97); }
    .complete-btn.secondary { background: transparent; border: 2px solid rgba(245,240,232,.3); color: var(--paper); opacity: .7; }

    .big-btn { display: block; width: 100%; background: var(--ink); color: var(--paper); border: none; border-radius: var(--radius); padding: 15px; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; text-align: center; margin-top: 14px; transition: transform .12s; }
    .big-btn.gold { background: var(--gold); color: var(--ink); font-weight: 700; }
    .big-btn:active { transform: scale(.97); }

    .review-score { text-align: center; margin-bottom: 16px; }
    .review-score .frac { font-family: 'Shippori Mincho', serif; font-size: 42px; font-weight: 800; color: var(--ink); }
    .review-score .lbl { font-size: 12px; color: var(--text-soft); }

    ::-webkit-scrollbar { width: 0; }

    /* FONT TOGGLE */
    :root { --kana-font: 'Noto Sans JP', sans-serif; }
    body.brush-font { --kana-font: 'Shippori Mincho', serif; }
    .q-kana, .q-romaji, .study-char, .choice-btn:not(.rom), .bk { font-family: var(--kana-font) !important; }

    .font-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; background: var(--paper-warm); border-radius: 10px; padding: 8px 12px; }
    .font-toggle-label { font-size: 11px; color: var(--text-soft); font-weight: 600; flex: 1; }
    .font-toggle-btns { display: flex; border-radius: 7px; overflow: hidden; border: 1.5px solid var(--ink); }
    .ftbtn { border: none; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-soft); font-family: 'DM Sans', sans-serif; transition: background .15s; }
    .ftbtn.active { background: var(--ink); color: var(--paper); }
    .ftbtn:first-child { border-right: 1px solid var(--ink); }
  </style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="app-header">
    <div>
      <div class="app-title">かな Drill</div>
      <div class="app-subtitle" id="home-mode-label">Hiragana</div>
    </div>
  </div>
  <div class="card-area">
    <div id="mode-tabs-container"></div>
    <div class="home-hero">
      <div class="kanji-bg" id="hero-bg">あいうえお</div>
      <h2 id="hero-title">Hiragana</h2>
      <p>Learn kana in blocks of 5 — unlock as you go</p>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="num" id="stat-complete">0</div><div class="lbl">Blocks Done</div></div>
      <div class="stat-card"><div class="num" id="stat-mastered">0</div><div class="lbl">Mastered</div></div>
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">Total Kana</div></div>
    </div>
    <div id="mastery-banner-container"></div>
    <div class="section-heading">Your Blocks</div>
    <div class="block-grid" id="block-grid"></div>
    <div class="section-heading" id="review-heading" style="display:none">Review Unlocked Kana</div>
    <div class="review-row" id="review-row"></div>
  </div>
</div>

<!-- STUDY -->
<div id="screen-study" class="screen">
  <div class="app-header">
    <button class="header-back" onclick="showScreen('home')">Back</button>
    <div style="text-align:right">
      <div class="app-title" id="study-title">Block 1</div>
      <div class="app-subtitle" id="study-subtitle">5 kana</div>
    </div>
  </div>
  <div class="card-area">
    <div class="word-list-header" style="text-align:center;margin-bottom:16px">
      <h2 style="font-family:'Shippori Mincho',serif;font-size:20px;font-weight:800;color:var(--ink)">Study these kana</h2>
      <p style="color:var(--text-soft);font-size:12px;margin-top:4px">Memorise the characters, then take the quiz</p>
    </div>
    <div class="font-toggle">
      <span class="font-toggle-label">Kana style</span>
      <div class="font-toggle-btns">
        <button class="ftbtn active" id="study-ft-clean" onclick="setFont('clean','study')">Clean</button>
        <button class="ftbtn" id="study-ft-brush" onclick="setFont('brush','study')">Brush</button>
      </div>
    </div>
    <div class="study-grid" id="study-cards"></div>
    <button class="big-btn gold" onclick="beginQuiz()">Start Quiz →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="app-header">
    <button class="header-back" onclick="confirmQuit()">Quit</button>
    <div style="text-align:right">
      <div class="app-title" id="quiz-block-label">Block 1</div>
      <div class="app-subtitle" id="quiz-mode-label">Hiragana</div>
    </div>
  </div>
  <div class="card-area" id="quiz-card-area">
    <div class="quiz-meta">
      <span class="quiz-phase-label" id="quiz-phase-label">Cycle 1</span>
      <div class="cycle-dots" id="cycle-dots"></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="question-card" id="question-card"></div>
    <div class="choices-grid" id="choices-grid"></div>
    <div class="feedback-area"><div class="feedback-pill" id="feedback-pill"></div></div>
  </div>
</div>

<!-- REVIEW -->
<div id="screen-review" class="screen">
  <div class="app-header">
    <button class="header-back" onclick="showScreen('home')">Done</button>
    <div style="text-align:right">
      <div class="app-title">Review</div>
      <div class="app-subtitle" id="review-subtitle">10 kana</div>
    </div>
  </div>
  <div class="card-area" id="review-card-area">
    <div class="font-toggle" style="margin-bottom:0">
      <span class="font-toggle-label">Kana style</span>
      <div class="font-toggle-btns">
        <button class="ftbtn" id="rev-ft-clean" onclick="setFont('clean','review')">Clean</button>
        <button class="ftbtn active" id="rev-ft-brush" onclick="setFont('brush','review')">Brush</button>
      </div>
    </div>
    <div id="review-content"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const KANA = {
  hiragana: [
    // Block 1 — vowels
    { char:'あ', rom:'a',   hint:'Looks like an "a"' },
    { char:'い', rom:'i',   hint:'Two strokes like "i i"' },
    { char:'う', rom:'u',   hint:'Like a curled "u"' },
    { char:'え', rom:'e',   hint:'A cross shape' },
    { char:'お', rom:'o',   hint:'"o" with extra stroke' },
    // Block 2 — k-row
    { char:'か', rom:'ka',  hint:'Like a sword' },
    { char:'き', rom:'ki',  hint:'Looks like a key' },
    { char:'く', rom:'ku',  hint:'A bird beak' },
    { char:'け', rom:'ke',  hint:'Tall "ke" shape' },
    { char:'こ', rom:'ko',  hint:'Two level lines' },
    // Block 3 — s-row
    { char:'さ', rom:'sa',  hint:'Like a cross + hook' },
    { char:'し', rom:'shi', hint:'A fishing hook' },
    { char:'す', rom:'su',  hint:'A loop with tail' },
    { char:'せ', rom:'se',  hint:'Like a capital "E"' },
    { char:'そ', rom:'so',  hint:'A soaring wave' },
    // Block 4 — t-row
    { char:'た', rom:'ta',  hint:'A table top' },
    { char:'ち', rom:'chi', hint:'A cheerful bounce' },
    { char:'つ', rom:'tsu', hint:'A crashing wave' },
    { char:'て', rom:'te',  hint:'An antenna' },
    { char:'と', rom:'to',  hint:'A toe stub' },
    // Block 5 — n-row
    { char:'な', rom:'na',  hint:'Like a knotted rope' },
    { char:'に', rom:'ni',  hint:'Needle and thread' },
    { char:'ぬ', rom:'nu',  hint:'Noodle swirl' },
    { char:'ね', rom:'ne',  hint:'A loop with neck' },
    { char:'の', rom:'no',  hint:'A simple spiral' },
    // Block 6 — h-row
    { char:'は', rom:'ha',  hint:'Laughing open mouth' },
    { char:'ひ', rom:'hi',  hint:'A smile saying "hee"' },
    { char:'ふ', rom:'fu',  hint:'Mt Fuji from above' },
    { char:'へ', rom:'he',  hint:'A simple peak' },
    { char:'ほ', rom:'ho',  hint:'Complex ho shape' },
    // Block 7 — m-row
    { char:'ま', rom:'ma',  hint:'A mama bird' },
    { char:'み', rom:'mi',  hint:'A curly music note' },
    { char:'む', rom:'mu',  hint:'A mooing cow' },
    { char:'め', rom:'me',  hint:'A tangled medusa' },
    { char:'も', rom:'mo',  hint:'A worm on a hook' },
    // Block 8 — y/r-row
    { char:'や', rom:'ya',  hint:"A yak's horns" },
    { char:'ゆ', rom:'yu',  hint:'A "U" with a tail' },
    { char:'よ', rom:'yo',  hint:'A yo-yo string' },
    { char:'ら', rom:'ra',  hint:'A radical stroke' },
    { char:'り', rom:'ri',  hint:'Reeds in water' },
    // Block 9 — r/w-row
    { char:'る', rom:'ru',  hint:'A rooster tail' },
    { char:'れ', rom:'re',  hint:'A reedy curve' },
    { char:'ろ', rom:'ro',  hint:'A rope coil' },
    { char:'わ', rom:'wa',  hint:'A wave with a dip' },
    { char:'を', rom:'wo',  hint:'Particle — wo/o' },
    // Block 10 — n + dakuten
    { char:'ん', rom:'n',   hint:'A simple curl' },
    { char:'が', rom:'ga',  hint:'か + dakuten' },
    { char:'ぎ', rom:'gi',  hint:'き + dakuten' },
    { char:'ぐ', rom:'gu',  hint:'く + dakuten' },
    { char:'げ', rom:'ge',  hint:'け + dakuten' },
  ],
  katakana: [
    // Block 1 — vowels
    { char:'ア', rom:'a',   hint:'Like a triangle "A"' },

// ── CONSTANTS ──────────────────────────────────────────────────
const BLOCK_SIZE       = 5;
const REQUIRED_CYCLES  = 2;
const MASTERY_SESSIONS = 3;
const MASTERY_THRESHOLDS = [0.60, 0.75, 0.90]; // 1-star, 2-star, 3-star (mastered)

const MODE_META = {
  hiragana: { label: 'Hiragana', script: 'あ', heroBg: 'あいうえお' },
  katakana: { label: 'Katakana', script: 'ア', heroBg: 'アイウエオ' },
};

// ── STATE ──────────────────────────────────────────────────────
let currentMode       = 'hiragana';
let currentBlockIndex = 0;
let currentBlock      = [];
let quizPhase         = 0; // 0 = char→rom, 1 = rom→char
let cycleCount        = 0;
let wordIndex         = 0;
let attempts          = 0;
let phaseOrder        = [];
let reviewWords       = [], reviewIndex = 0, reviewCorrect = 0, reviewType = '';
let quizCorrect       = 0, quizTotal = 0;
let cycleHasMistake   = false; // any mistake in current cycle
let quizPassed        = false; // both cycles completed without any mistake

// ── PERSISTENCE ────────────────────────────────────────────────
const getProgress  = () => JSON.parse(localStorage.getItem('kana_v1') || '{}');
const saveProgress = p  => localStorage.setItem('kana_v1', JSON.stringify(p));

// ── MASTERY HELPERS ────────────────────────────────────────────
function getMasteryData(mode, blockIdx) {
  const prog = getProgress();
  const key  = `${mode}_${blockIdx}`;
  return prog[key] || { done: false, sessions: [] };
}

function getMasteryLevel(mode, blockIdx) {
  const d = getMasteryData(mode, blockIdx);
  if (!d.sessions || d.sessions.length === 0) return 0;
  const recent = d.sessions.slice(-MASTERY_SESSIONS);
  const avg    = recent.reduce((a, s) => a + s, 0) / recent.length;
  if (avg >= MASTERY_THRESHOLDS[2]) return 3;
  if (avg >= MASTERY_THRESHOLDS[1]) return 2;
  if (avg >= MASTERY_THRESHOLDS[0]) return 1;
  return 0;
}

function getMasteryAvg(mode, blockIdx) {
  const d = getMasteryData(mode, blockIdx);
  if (!d.sessions || d.sessions.length === 0) return 0;
  const recent = d.sessions.slice(-MASTERY_SESSIONS);
  return recent.reduce((a, s) => a + s, 0) / recent.length;
}

function recordSession(mode, blockIdx, accuracy) {
  const prog = getProgress();
  const key  = `${mode}_${blockIdx}`;
  if (!prog[key]) prog[key] = { done: true, sessions: [] };
  prog[key].done = true;
  prog[key].sessions = prog[key].sessions || [];
  prog[key].sessions.push(accuracy);
  saveProgress(prog);
}

// ── HELPERS ────────────────────────────────────────────────────
function isBlockUnlocked(mode, i, prog) {
  if (i === 0) return true;
  return !!(prog[`${mode}_${i-1}`]?.done);
}

function shuffle(arr) {
  return [...arr].map(v => ({ v, r: Math.random() })).sort((a, b) => a.r - b.r).map(o => o.v);
}

function getDistractors(current, allKana, count) {
  const pool = allKana.filter(k => k.char !== current.char);
  return shuffle(pool).slice(0, count);
}

// ── SCREEN MANAGER ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'home') { renderHome(); setFont('clean', null); }
}

// ── HOME ────────────────────────────────────────────────────────
function renderHome() {
  const prog  = getProgress();
  const kana  = KANA[currentMode];
  const n     = Math.ceil(kana.length / BLOCK_SIZE);
  const meta  = MODE_META[currentMode];

  let done = 0, mastered = 0;
  for (let i = 0; i < n; i++) {
    if (prog[`${currentMode}_${i}`]?.done) done++;
    if (getMasteryLevel(currentMode, i) === 3) mastered++;
  }

  document.getElementById('hero-bg').textContent         = meta.heroBg;
  document.getElementById('hero-title').textContent      = meta.label;
  document.getElementById('home-mode-label').textContent = meta.label;
  document.getElementById('stat-complete').textContent   = done;
  document.getElementById('stat-mastered').textContent   = mastered;
  document.getElementById('stat-total').textContent      = kana.length;

  // mode tabs
  const tabsEl = document.getElementById('mode-tabs-container');
  tabsEl.innerHTML = '<div class="mode-tabs">' +
    ['hiragana','katakana'].map(m => {
      const active = m === currentMode;
      return `<button class="mode-tab ${active ? 'active' : ''}" onclick="switchMode('${m}')">
        <span class="tab-script">${MODE_META[m].script}</span>
        <span>${MODE_META[m].label}</span>
      </button>`;
    }).join('') + '</div>';

  // mastery progress banner (if any blocks started)
  const bannerEl = document.getElementById('mastery-banner-container');
  if (done > 0) {
    const totalSessions = Array.from({length: n}, (_,i) => getMasteryData(currentMode,i).sessions?.length || 0).reduce((a,b)=>a+b,0);
    const avgMastery    = done > 0 ? Array.from({length:done},(_,i)=>getMasteryAvg(currentMode,i)).reduce((a,b)=>a+b,0)/done : 0;
    const pct           = Math.round(avgMastery * 100);
    bannerEl.innerHTML  = `
      <div class="mastery-banner">
        <h3>Mastery Progress — ${meta.label}</h3>
        <div class="mastery-track"><div class="mastery-fill" style="width:${pct}%"></div></div>
        <div class="mastery-label">${pct}% avg accuracy across ${done} block${done!==1?'s':''} · ${mastered} mastered</div>
        <div class="mastery-stars">${[0,1,2].map(i=>`<div class="mastery-star${mastered>i?' lit':''}"></div>`).join('')}</div>
      </div>`;
  } else {
    bannerEl.innerHTML = '';
  }

  // block grid
  const grid = document.getElementById('block-grid');
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d       = prog[`${currentMode}_${i}`];
    const isDone  = !!d?.done;
    const open    = isBlockUnlocked(currentMode, i, prog);
    const ml      = isDone ? getMasteryLevel(currentMode, i) : 0;
    const isMast  = ml === 3;
    const firstChar = kana[i * BLOCK_SIZE].char;
    const btn     = document.createElement('button');
    btn.className = `block-btn ${open ? 'unlocked' : 'locked'} ${isMast ? 'mastered' : isDone ? 'complete' : ''}`;
    btn.innerHTML = `<span class="bn">${i+1}</span><span class="bk">${firstChar}</span><span style="font-size:9px">${isMast ? '★' : isDone ? '✓' : open ? '○' : '🔒'}</span>`;
    btn.disabled  = !open;
    if (open) btn.onclick = () => openBlock(i);
    grid.appendChild(btn);
  }

  // review section
  const reviewHeading = document.getElementById('review-heading');
  const reviewRow     = document.getElementById('review-row');
  if (done === 0) { reviewHeading.style.display = 'none'; reviewRow.innerHTML = ''; return; }
  reviewHeading.style.display = '';

  const enough  = done >= 2; // need 2 blocks (10 kana) for review
  const lockCls = enough ? '' : ' review-btn-locked';
  const lockEl  = enough ? '' : '<span class="review-lock">🔒 Complete 2 blocks first</span>';
  const s       = currentMode === 'hiragana' ? 'あ' : 'ア';

  reviewRow.innerHTML = `
    <div class="review-grid-2">
      <button class="review-btn${lockCls}" onclick="${enough ? "startReview('char-rom')" : ''}">
        <span class="ri">${s}→ ro</span>Kana → Romaji${lockEl}
      </button>
      <button class="review-btn${lockCls}" onclick="${enough ? "startReview('rom-char')" : ''}">
        <span class="ri">ro→${s}</span>Romaji → Kana${lockEl}
      </button>
    </div>`;
}

function switchMode(m) { currentMode = m; renderHome(); }

// ── STUDY SCREEN ────────────────────────────────────────────────
function openBlock(i) {
  currentBlockIndex = i;
  const kana        = KANA[currentMode];
  currentBlock      = kana.slice(i * BLOCK_SIZE, (i + 1) * BLOCK_SIZE);
  quizCorrect = 0; quizTotal = 0;

  document.getElementById('study-title').textContent    = 'Block ' + (i + 1);
  document.getElementById('study-subtitle').textContent = MODE_META[currentMode].label + ' · ' + currentBlock.length + ' kana';

  const cards = document.getElementById('study-cards');
  cards.innerHTML = '';
  currentBlock.forEach(k => {
    const d  = document.createElement('div');
    d.className = 'study-card';
    d.innerHTML = `<div class="study-char">${k.char}</div><div class="study-rom">${k.rom}</div><div class="study-hint">${k.hint}</div>`;
    cards.appendChild(d);
  });
  showScreen('study');
}

// ── QUIZ ────────────────────────────────────────────────────────
function beginQuiz() {
  quizPhase  = 0;
  cycleCount = 0;
  wordIndex  = 0;
  attempts   = 0;
  quizCorrect = 0;
  quizTotal   = 0;
  cycleHasMistake = false;
  quizPassed      = true; // innocent until proven guilty
  phaseOrder  = shuffle(currentBlock);

  document.getElementById('quiz-card-area').innerHTML = `
    <div class="quiz-meta">
      <span class="quiz-phase-label" id="quiz-phase-label">Cycle 1</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="clean-indicator" style="font-size:10px;font-weight:700;letter-spacing:.08em;color:#27ae60">● CLEAN</span>
        <div class="cycle-dots" id="cycle-dots"></div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="font-toggle">
      <span class="font-toggle-label">Kana style</span>
      <div class="font-toggle-btns">
        <button class="ftbtn ${!document.body.classList.contains('brush-font')?'active':''}" id="quiz-ft-clean" onclick="setFont('clean','quiz')">Clean</button>
        <button class="ftbtn ${document.body.classList.contains('brush-font')?'active':''}" id="quiz-ft-brush" onclick="setFont('brush','quiz')">Brush</button>
      </div>
    </div>
    <div class="question-card" id="question-card"></div>
    <div class="choices-grid" id="choices-grid"></div>
    <div class="feedback-area"><div class="feedback-pill" id="feedback-pill"></div></div>`;

  showScreen('quiz');
  renderQuizFrame();
}

function renderQuizFrame() {
  document.getElementById('quiz-block-label').textContent = 'Block ' + (currentBlockIndex + 1);
  document.getElementById('quiz-mode-label').textContent  = MODE_META[currentMode].label;

  // cycle dots
  const dots = document.getElementById('cycle-dots');
  dots.innerHTML = '';
  for (let i = 0; i < REQUIRED_CYCLES; i++) {
    const d = document.createElement('div');
    d.className = 'cycle-dot ' + (i < cycleCount ? 'done' : i === cycleCount ? 'active' : '');
    dots.appendChild(d);
  }

  showQuestion();
}

// Phase 0 = char → rom (multiple choice romaji), Phase 1 = rom → char (multiple choice character)
function showQuestion() {
  const w   = phaseOrder[wordIndex];
  const kana = KANA[currentMode];

  // Progress bar
  const totalSteps = currentBlock.length * 2 * REQUIRED_CYCLES;
  const doneSteps  = cycleCount * currentBlock.length * 2 + quizPhase * currentBlock.length + wordIndex;
  document.getElementById('progress-fill').style.width = Math.min((doneSteps / totalSteps) * 100, 99) + '%';

  const cycleLabels = ['With hints', 'No hints'];
  document.getElementById('quiz-phase-label').textContent = `Cycle ${cycleCount+1}/2 · ${cycleLabels[cycleCount]}`;

  const qCard = document.getElementById('question-card');
  const choicesEl = document.getElementById('choices-grid');
  clearFeedback();

  // Build question and choices
  if (quizPhase === 0) {
    // CHAR → ROM: show character, pick romaji
    let promptHtml = `<div class="q-label">What is the reading?</div><div class="q-kana">${w.char}</div>`;
    if (cycleCount === 0) promptHtml += `<div class="q-hint">${w.hint}</div>`;
    qCard.innerHTML = promptHtml;

    const distractors = getDistractors(w, kana, 3);
    const choices     = shuffle([{ rom: w.rom, correct: true }, ...distractors.map(k => ({ rom: k.rom, correct: false }))]);
    choicesEl.innerHTML = choices.map(c =>
      `<button class="choice-btn rom" onclick="checkChoice(this, ${c.correct})">${c.rom}</button>`
    ).join('');
  } else {
    // ROM → CHAR: show romaji, pick character
    let promptHtml = `<div class="q-label">Which character?</div><div class="q-romaji">${w.rom}</div>`;
    if (cycleCount === 0) promptHtml += `<div class="q-hint">${w.hint}</div>`;
    qCard.innerHTML = promptHtml;

    const distractors = getDistractors(w, kana, 3);
    const choices     = shuffle([{ char: w.char, correct: true }, ...distractors.map(k => ({ char: k.char, correct: false }))]);
    choicesEl.innerHTML = choices.map(c =>
      `<button class="choice-btn" onclick="checkChoice(this, ${c.correct})">${c.char}</button>`
    ).join('');
  }
}

function checkChoice(btn, isCorrect) {
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);
  quizTotal++;

  if (isCorrect) {
    btn.classList.add('correct');
    showFeedback('correct', '✓ Correct!');
    quizCorrect++;
    setTimeout(nextWord, 700);
  } else {
    btn.classList.add('wrong');
    cycleHasMistake = true;
    quizPassed      = false;
    // Flip the clean indicator
    const ind = document.getElementById('clean-indicator');
    if (ind) { ind.textContent = '✗ MISTAKE'; ind.style.color = '#c0392b'; }
    // Reveal the correct answer
    allBtns.forEach(b => {
      if (b.textContent === phaseOrder[wordIndex].char || b.textContent === phaseOrder[wordIndex].rom)
        b.classList.add('correct');
    });
    showFeedback('reveal', '✗ ' + (quizPhase === 0 ? phaseOrder[wordIndex].rom : phaseOrder[wordIndex].char));
    setTimeout(nextWord, 1600);
  }
}

function clearFeedback() {
  const p = document.getElementById('feedback-pill');
  if (p) { p.className = 'feedback-pill'; p.textContent = ''; }
}

function showFeedback(type, msg) {
  const p = document.getElementById('feedback-pill');
  if (p) { p.className = 'feedback-pill ' + type + ' show'; p.textContent = msg; }
}

function nextWord() {
  wordIndex++;
  if (wordIndex < phaseOrder.length) { showQuestion(); return; }

  // next phase within this cycle
  quizPhase++;
  if (quizPhase < 2) {
    wordIndex = 0; phaseOrder = shuffle(currentBlock);
    renderQuizFrame(); return;
  }

  // completed both phases — end of cycle
  quizPhase = 0; cycleCount++;
  cycleHasMistake = false; // reset for next cycle
  if (cycleCount < REQUIRED_CYCLES) {
    wordIndex = 0; phaseOrder = shuffle(currentBlock);
    renderQuizFrame();
  } else {
    blockComplete();
  }
}

function blockComplete() {
  const accuracy   = quizTotal > 0 ? quizCorrect / quizTotal : 0;
  const kana       = KANA[currentMode];
  const numBlocks  = Math.ceil(kana.length / BLOCK_SIZE);
  const isLast     = currentBlockIndex + 1 >= numBlocks;

  document.getElementById('progress-fill').style.width = '100%';

  if (quizPassed) {
    // Clean pass — mark done and record session
    recordSession(currentMode, currentBlockIndex, accuracy);
    const ml       = getMasteryLevel(currentMode, currentBlockIndex);
    const d        = getMasteryData(currentMode, currentBlockIndex);
    const sessions = d.sessions || [];
    const needed   = Math.max(0, MASTERY_SESSIONS - sessions.length);

    let masteryNote = '';
    if (ml === 3) masteryNote = 'This block is mastered!';
    else if (needed > 0) masteryNote = `${needed} more perfect run${needed!==1?'s':''} to unlock mastery`;
    else masteryNote = `${Math.round(MASTERY_THRESHOLDS[2]*100)}% avg needed — keep going`;

    let primaryBtn = '';
    if (!isLast) primaryBtn = `<button class="complete-btn" onclick="openBlock(${currentBlockIndex+1})">Next: Block ${currentBlockIndex+2} →</button>`;

    document.getElementById('quiz-card-area').innerHTML = `
      <div class="complete-card">
        <div class="big-emoji">★</div>
        <h2>Block ${currentBlockIndex+1} cleared!</h2>
        <p>Both cycles — no mistakes</p>
        <div class="mastery-result">
          <div class="mr-label">Mastery</div>
          <div class="mr-stars">${[0,1,2].map(i=>`<div class="mr-star${ml>i?' lit':''}"></div>`).join('')}</div>
          <div class="mr-note">${masteryNote}</div>
        </div>
        ${primaryBtn}
        <button class="complete-btn" onclick="beginQuiz()">Drill Again ↺</button>
        <button class="complete-btn secondary" onclick="showScreen('home')">Back to Home</button>
      </div>`;
  } else {
    // Had mistakes — can't unlock, must retry
    const wrong = quizTotal - quizCorrect;
    document.getElementById('quiz-card-area').innerHTML = `
      <div class="complete-card">
        <div class="big-emoji">📚</div>
        <h2>Not quite!</h2>
        <p>${wrong} mistake${wrong!==1?'s':''} — you need a perfect run to unlock the next block</p>
        <button class="complete-btn" onclick="openBlock(${currentBlockIndex})">Study Again</button>
        <button class="complete-btn" onclick="beginQuiz()">Retry Quiz ↺</button>
        <button class="complete-btn secondary" onclick="showScreen('home')">Back to Home</button>
      </div>`;
  }
}
}

function confirmQuit() {
  if (confirm('Quit this quiz? Your progress in this session will be lost.')) showScreen('home');
}

// ── REVIEW ──────────────────────────────────────────────────────
function startReview(type) {
  const prog  = getProgress();
  const kana  = KANA[currentMode];
  const n     = Math.ceil(kana.length / BLOCK_SIZE);
  const pool  = [];
  for (let i = 0; i < n; i++) {
    if (prog[`${currentMode}_${i}`]?.done)
      pool.push(...kana.slice(i * BLOCK_SIZE, (i+1) * BLOCK_SIZE));
  }
  if (pool.length < 10) { alert('Complete at least 2 blocks to unlock review!'); return; }

  reviewType    = type;
  reviewWords   = shuffle(pool).slice(0, 10);
  reviewIndex   = 0;
  reviewCorrect = 0;

  const typeLabel = type === 'char-rom' ? 'Kana → Romaji' : 'Romaji → Kana';
  document.getElementById('review-subtitle').textContent = typeLabel + ' · 10 kana';
  showScreen('review');
  // Default review to brush font for extra challenge
  setFont('brush', 'review');
  showReviewQ();
}

function showReviewQ() {
  const w    = reviewWords[reviewIndex];
  const kana = KANA[currentMode];
  const area = document.getElementById('review-content');

  const isCharRom = reviewType === 'char-rom';
  const prompt    = isCharRom
    ? `<div class="q-label">What is the reading?</div><div class="q-kana">${w.char}</div>`
    : `<div class="q-label">Which character?</div><div class="q-romaji">${w.rom}</div>`;

  const distractors  = getDistractors(w, kana, 3);
  const choices      = isCharRom
    ? shuffle([{ val: w.rom, correct: true }, ...distractors.map(k => ({ val: k.rom, correct: false }))])
    : shuffle([{ val: w.char, correct: true }, ...distractors.map(k => ({ val: k.char, correct: false }))]);

  const btnClass = isCharRom ? 'choice-btn rom' : 'choice-btn';

  area.innerHTML = `
    <div class="review-score">
      <div class="frac">${reviewIndex}<span style="font-size:24px;opacity:.4">/10</span></div>
      <div class="lbl">${reviewCorrect} correct · ${reviewType === 'char-rom' ? 'Kana → Romaji' : 'Romaji → Kana'}</div>
    </div>
    <div class="question-card" style="min-height:150px">${prompt}</div>
    <div class="choices-grid" id="review-choices">
      ${choices.map((c,i) => `<button class="${btnClass}" onclick="checkReview(${i}, ${c.correct})">${c.val}</button>`).join('')}
    </div>
    <div class="feedback-area"><div class="feedback-pill" id="review-fb"></div></div>`;
}

function checkReview(idx, isCorrect) {
  const btns = document.querySelectorAll('#review-choices .choice-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('review-fb');

  if (isCorrect) {
    btns[idx].classList.add('correct');
    reviewCorrect++;
    fb.className = 'feedback-pill correct show'; fb.textContent = '✓ Correct!';
  } else {
    btns[idx].classList.add('wrong');
    // find and highlight correct
    btns.forEach((b, i) => {
      if (b.textContent === reviewWords[reviewIndex].char || b.textContent === reviewWords[reviewIndex].rom) {
        if (!b.classList.contains('wrong')) b.classList.add('correct');
      }
    });
    fb.className = 'feedback-pill reveal show';
    fb.textContent = 'Correct: ' + (reviewType === 'char-rom' ? reviewWords[reviewIndex].rom : reviewWords[reviewIndex].char);
  }
  reviewIndex++;
  setTimeout(reviewIndex < reviewWords.length ? showReviewQ : showReviewDone, 1200);
}

function showReviewDone() {
  const pct   = Math.round((reviewCorrect / reviewWords.length) * 100);
  const emoji = pct >= 80 ? '🌟' : pct >= 50 ? '👍' : '📚';
  const msg   = pct === 100 ? 'Perfect score!' : pct >= 80 ? 'Great work!' : pct >= 50 ? 'Getting there!' : 'Keep practising!';
  document.getElementById('review-content').innerHTML = `
    <div class="complete-card">
      <div class="big-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${reviewCorrect}/10 correct — ${pct}%</p>
      <button class="complete-btn" onclick="startReview('${reviewType}')">Try Again ↺</button>
      <button class="complete-btn secondary" onclick="showScreen('home')">Back to Home</button>
    </div>`;
}

// ── FONT TOGGLE ────────────────────────────────────────────────
function setFont(style, screen) {
  if (style === 'brush') {
    document.body.classList.add('brush-font');
  } else {
    document.body.classList.remove('brush-font');
  }
  // Update button states for whichever screen's toggle was used
  const prefixes = { study: 'study', quiz: 'quiz', review: 'rev' };
  const p = prefixes[screen];
  if (p) {
    const cleanBtn = document.getElementById(p + '-ft-clean');
    const brushBtn = document.getElementById(p + '-ft-brush');
    if (cleanBtn) cleanBtn.classList.toggle('active', style === 'clean');
    if (brushBtn) brushBtn.classList.toggle('active', style === 'brush');
  }
}

// ── INIT ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderHome();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
});
</script>
